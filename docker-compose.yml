version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistem-agent-backend
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      # GitHub Issue Auto-Creation
      - GITHUB_REPO=${GITHUB_REPO:-Jailtonfonseca/sistem-agent}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ISSUE_LABELS=${ISSUE_LABELS:-bug,auto-reported}
      - APP_NAME=sistem-agent
      - APP_VERSION=1.0.0
    restart: unless-stopped
    networks:
      - sistem-agent

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sistem-agent-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3000/api
      - NEXT_PUBLIC_GITHUB_TOKEN=${GITHUB_TOKEN}
      - NEXT_PUBLIC_ISSUE_LABELS=${ISSUE_LABELS:-bug,auto-reported,frontend}
      # Frontend settings from localStorage
      - NEXT_PUBLIC_GITHUB_REPO=${GITHUB_REPO:-Jailtonfonseca/sistem-agent}
      - NEXT_PUBLIC_GITHUB_TOKEN=${GITHUB_TOKEN}
      - NEXT_PUBLIC_ISSUE_LABELS=${ISSUE_LABELS:-bug,auto-reported,frontend}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sistem-agent

  # Ollama (IA local - opcional)
  ollama:
    image: ollama/ollama:latest
    container_name: sistem-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - sistem-agent
    profiles:
      - ia

  # Redis (cache e filas)
  redis:
    image: redis:7-alpine
    container_name: sistem-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - sistem-agent

networks:
  sistem-agent:
    driver: bridge

volumes:
  ollama-data:
  redis-data:
